version: 2.1

orbs:
  docker-publish: circleci/docker-publish@0.1.3

jobs:
  build:
    environment:
      - TZ: "/usr/share/zoneinfo/America/Los_Angeles"
      - CONTAINER_NAME: "mgoubran/miracl"
    docker:
      - image: docker:18.06.3-ce-git
    working_directory: /tmp/src/MIRACL
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: Build Docker image
          no_output_timeout: 60m
          command: |
            # Build docker image
            MIRACL_VERSION=$(cat /tmp/src/MIRACL/miracl/version.txt)
            echo "miracl version is ${MIRACL_VERSION}"
            e=1 && for i in {1..5}; do
              docker build \
                --rm=false \
                -t ${CONTAINER_NAME} \
                -f /tmp/src/MIRACL/Dockerfile \
                --build-arg BUILD_DATE=`date -u +"%Y-%m-%dT%H:%M:%SZ"` \
                --build-arg VCS_REF=`git rev-parse --short HEAD` \
                --build-arg VERSION="${CIRCLE_TAG:-$THISVERSION}" . \
              && e=0 && break || sleep 15
            done && [ "$e" -eq "0" ]
      - run:
          name: Run Tests
          no_output_timeout: 2h
          command: |
            echo "Running tests:"
            docker run -it mgoubran/miracl echo "Docker run test"
      - store_test_results:
          path: /tmp/tests

  singularity-publish:
    docker:
      - image: quay.io/singularity/singularity:v3.10.3
    working_directory: /root/project/MIRACL
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: Compile and push Singularity image
          no_output_timeout: 2h
          command: |
            # Log in to cloud.sylabs.io
            echo $SYLABS_TOKEN_MAR_08_2024 > tokenfile && \
            singularity remote login -u aiconslab --tokenfile tokenfile && \
            # Create Singularity container remotely and push to cloud
            singularity build miracl.sif docker://mgoubran/miracl:latest
            # Setting trap in case image cannot be deleted
            set -e
            trap "echo 'Image doesn't exist - catching error!'; if [ $? == 255 ]; then echo 'Error 255'; fi" ERR
            # Remove current Singularity container
            singularity delete --force library://aiconslab/miracl/miracl:latest && \
            # Unset trap
            trap - ERR
            singularity push -U miracl.sif library://aiconslab/miracl/miracl:latest

  singularity-build:
    parameters:
      branch:
        type: string
        default: dev
    docker:
      - image: quay.io/singularity/singularity:v3.10.3
    working_directory: /root/project/MIRACL
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: Compile Singularity image
          no_output_timeout: 2h
          command: |
            # Create Singularity container remotely and push to cloud
            singularity build miracl.sif docker://mgoubran/miracl:<< parameters.branch >>-latest

workflows:
  build_and_test:
    jobs:
      - build:
          filters:
            tags:
              only: /.*/

  build_without_publishing_job:
    jobs:
      - docker-publish/publish:
          image: mgoubran/miracl
          deploy: false
          tag: latest
          filters:
            branches:
              ignore: 
                - master
                - docs*
                - dev
                - nightly
          after_build:
            - run:
                name: Preview Docker Tag for Build
                command: |
                   DOCKER_TAG=$(docker run --entrypoint /bin/cat mgoubran/miracl:latest /code/miracl/version.txt)
                   echo "Version for Docker tag is ${DOCKER_TAG}"

  # This workflow will deploy images on merge to master only
  # Should only push MIRACL Docker image and not base-image
  # If base-image needs to be pushed as well add the following line:
  # docker tag mgoubran/miracl:revised-base-latest mgoubran/miracl:revised-base-${DOCKER_TAGs}
  docker-publish-singularity-publish:
    jobs:
      - docker-publish/publish:
          name: docker-publish-base
          image: mgoubran/miracl
          dockerfile: docker/Dockerfile
          tag: latest-base
          filters:
            branches:
             only: master
      - docker-publish/publish:
          requires:
            - docker-publish-base
          name: docker-publish-final
          image: mgoubran/miracl
          tag: latest
          filters:
            branches:
             only: master
          after_build:
            - run:
                name: Publish Docker Tag with MIRACL Version
                command: |
                   DOCKER_TAG=$(docker run --entrypoint /bin/cat mgoubran/miracl:latest /code/miracl/version.txt)
                   echo "Version for Docker tag is ${DOCKER_TAG}"
                   docker tag mgoubran/miracl:latest mgoubran/miracl:${DOCKER_TAG}
      - singularity-publish:
          context:
            - miracl_singularity
          requires:
            - docker-publish-final
          filters:
            branches:
              only: master
  
  docker-publish-singularity-build:
    jobs:
      - docker-publish/publish:
          name: docker-publish-base
          image: mgoubran/miracl
          tag: ${CIRCLE_BRANCH}-base
          filters:
            branches:
             only:
              - dev
              - nightly
          dockerfile: docker/Dockerfile
      - docker-publish/publish:
          name: docker-publish-final
          requires:
            - docker-publish-base
          image: mgoubran/miracl
          tag: ${CIRCLE_BRANCH}-latest
          extra_build_args: --build-arg MIRACL_VERSION=${CIRCLE_BRANCH}
          filters:
            branches:
             only:
              - dev
              - nightly
          after_build:
            - run:
                name: Publish Docker Tag with MIRACL Version
                command: |
                   DOCKER_TAG=$(docker run --entrypoint /bin/cat mgoubran/miracl:${CIRCLE_BRANCH}-latest /code/miracl/version.txt)
                   echo "Version for Docker tag is ${DOCKER_TAG}"
                   docker tag mgoubran/miracl:${CIRCLE_BRANCH}-latest mgoubran/miracl:${CIRCLE_BRANCH}-${DOCKER_TAG}
      - singularity-build:
          context:
            - miracl_singularity
          requires:
            - docker-publish-final
          branch: ${CIRCLE_BRANCH}
          filters:
            branches:
              only:
                - dev
                - nightly